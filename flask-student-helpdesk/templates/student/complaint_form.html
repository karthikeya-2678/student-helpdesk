{% extends "base.html" %}

{% block title %}{{ category }} Complaint - Student Help Desk{% endblock %}

{% block content %}
<div class="form-container">
    <div class="form-card">
        <div class="form-header">
            <a href="{{ url_for('student_dashboard') }}" class="back-link">← Back to Categories</a>
            <h1>{{ category }} Complaint</h1>
            <p>Describe your issue in detail below</p>
        </div>
        
        <form method="POST" action="{{ url_for('student_complaint', category=category) }}" class="complaint-form">
            <div class="form-group">
                <label for="message">Complaint Details</label>
                <textarea 
                    id="message" 
                    name="message" 
                    rows="8"
                    placeholder="Please describe your complaint in detail. Include specific information like location, date/time, and any relevant details that will help us address your concern."
                    required
                    maxlength="2000"
                ></textarea>
                <span class="char-counter"><span id="charCount">0</span>/2000 characters</span>
            </div>
            
            <div class="form-actions">
                <a href="{{ url_for('student_dashboard') }}" class="btn btn-secondary">Cancel</a>
                <button type="submit" class="btn btn-primary">Submit Complaint</button>
            </div>
        </form>
    </div>
</div>

<script>
    const textarea = document.getElementById('message');
    const charCount = document.getElementById('charCount');
    
    textarea.addEventListener('input', function() {
        charCount.textContent = this.value.length;
    });
</script>
{% endblock %}
