{% extends "base.html" %}

{% block title %}Student Login - Student Help Desk{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-icon">👨‍🎓</div>
            <h1>Student Login</h1>
            <p>Enter your details to access the portal</p>
        </div>
        
        <form method="POST" action="{{ url_for('student_login') }}" class="auth-form">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input 
                    type="text" 
                    id="name" 
                    name="name" 
                    placeholder="Enter your full name"
                    required
                    maxlength="100"
                    autocomplete="name"
                >
            </div>
            
            <div class="form-group">
                <label for="roll">Roll Number</label>
                <input 
                    type="text" 
                    id="roll" 
                    name="roll" 
                    placeholder="Enter your roll number"
                    required
                    maxlength="50"
                    autocomplete="off"
                >
            </div>
            
            <button type="submit" class="btn btn-primary btn-block">
                Login to Portal
            </button>
        </form>
        
        <div class="auth-footer">
            <p>First time? Just enter your details to register automatically.</p>
            <a href="{{ url_for('home') }}">← Back to Home</a>
        </div>
    </div>
</div>
{% endblock %}
