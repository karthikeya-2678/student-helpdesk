{% extends "base.html" %}

{% block title %}Admin Profile - Student Help Desk{% endblock %}

{% block content %}
<div class="form-container">
    <div class="form-card">
        <div class="form-header">
            <h1>Complete Your Profile</h1>
            <p>Please provide your details to proceed</p>
        </div>
        
        <form method="POST" action="{{ url_for('admin_profile') }}" class="profile-form">
            <div class="form-group">
                <label for="admin_name">Your Name</label>
                <input 
                    type="text" 
                    id="admin_name" 
                    name="admin_name" 
                    placeholder="Enter your full name"
                    value="{{ admin.admin_name or '' }}"
                    required
                    maxlength="100"
                >
            </div>
            
            <div class="form-group">
                <label for="department">Department</label>
                <input 
                    type="text" 
                    id="department" 
                    name="department" 
                    placeholder="e.g., Student Affairs, Infrastructure"
                    value="{{ admin.department or '' }}"
                    required
                    maxlength="100"
                >
            </div>
            
            <div class="form-group">
                <label for="role">Role / Designation</label>
                <input 
                    type="text" 
                    id="role" 
                    name="role" 
                    placeholder="e.g., Dean, Warden, Manager"
                    value="{{ admin.role or '' }}"
                    required
                    maxlength="100"
                >
            </div>
            
            <div class="form-actions">
                <button type="submit" class="btn btn-admin btn-block">
                    Save Profile
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
