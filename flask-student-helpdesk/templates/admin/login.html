{% extends "base.html" %}

{% block title %}Admin Login - Student Help Desk{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card auth-admin">
        <div class="auth-header">
            <div class="auth-icon">👨‍💼</div>
            <h1>Admin Login</h1>
            <p>Access the administration portal</p>
        </div>
        
        <form method="POST" action="{{ url_for('admin_login') }}" class="auth-form">
            <div class="form-group">
                <label for="college_name">College Name</label>
                <input 
                    type="text" 
                    id="college_name" 
                    name="college_name" 
                    placeholder="Enter college name"
                    required
                    maxlength="100"
                    autocomplete="organization"
                >
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    placeholder="Enter your password"
                    required
                    maxlength="100"
                    autocomplete="current-password"
                >
            </div>
            
            <button type="submit" class="btn btn-admin btn-block">
                Login to Admin Portal
            </button>
        </form>
        
        <div class="auth-footer">
            <p>Contact IT department for login credentials.</p>
            <a href="{{ url_for('home') }}">← Back to Home</a>
        </div>
    </div>
</div>
{% endblock %}
